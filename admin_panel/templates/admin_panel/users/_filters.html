<form class="flex flex-col sm:flex-row gap-3 w-full md:w-auto" onsubmit="return false;">
        
        <!-- Live username/email search parameters -->
        <div class="relative w-full sm:w-64">
          <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
            </svg>
          </span>
          <input type="text"
            name="q"
            placeholder="Search users..."
            hx-get="{% url 'admin_panel:users_table' %}"
            hx-target="#users-table-wrapper"
            hx-trigger="keyup changed delay:300ms"
            hx-swap="innerHTML"
            hx-include="#search-users"
            
                 class="w-full text-xs border border-slate-200 rounded-lg pl-9 pr-4 py-2 bg-white focus:outline-none focus:ring-1 focus:ring-brand focus:border-brand" />
        </div>
        
        <!-- Filter select options -->
        <select  name="role"
                id="filter-user-role"
                hx-get="{% url 'admin_panel:users_table' %}"
                hx-target="#users-table-wrapper"
                hx-include="#search-users"
                hx-trigger="change"
                class="text-xs border border-slate-200 rounded-lg py-2 px-3 bg-white text-slate-700 font-medium outline-none focus:ring-1 focus:ring-brand focus:border-brand">
          <option value="all">All Roles & Profiles</option>
          <option value="attendee">Attendee Accounts</option>
          <option value="organizer">Platform Organizers</option>
          <option value="validator">Validator Operations</option>
          <option value="suspended">Suspended Profiles</option>
        </select>

      </form>
