   <form class="flex flex-col sm:flex-row gap-3 w-full md:w-auto" onsubmit="return false;"
    >
        
        <!-- Live Search Input -->
        <div class="relative w-full sm:w-64">
          <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
            </svg>
          </span>
          <input type="text"
            name="q"
            placeholder="Search applications..."
            hx-get="{% url 'admin_panel:applications_table' %}"
            hx-target="#applications-table-wrapper"
            hx-trigger="keyup changed delay:300ms"
            hx-include="#status-filter"
            hx-swap="innerHTML"
                 class="w-full text-xs border border-slate-200 rounded-lg pl-9 pr-4 py-2 bg-white focus:outline-none focus:ring-1 focus:ring-brand focus:border-brand" />
        </div>
        
        <!-- Filter Selector -->
        <select id="status-filter"
            name="status"
            hx-get="{% url 'admin_panel:applications_table' %}"
            hx-target="#applications-table-wrapper"
            hx-trigger="change"
            
            class="border rounded-lg p-2"
        >
            <option value="all">All</option>
            <option value="pending">Pending</option>
            <option value="approved">Approved</option>
            <option value="rejected">Rejected</option>
        </select>

      </form>
