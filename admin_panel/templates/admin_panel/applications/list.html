{% extends "admin_panel/base.html" %}

{% block content %}


      <div id="applications-table">

        {% include "admin_panel/applications/_table.html" %}

    </div>
<!-- Rejection Modal popup template triggerable from action scripts -->
<div id="rejection-modal-overlay" class="fixed inset-0 bg-slate-900/60 flex items-center justify-center p-4 z-50 hidden backdrop-blur-sm">
  <div class="bg-white rounded-xl shadow-xl border border-slate-200 w-full max-w-md overflow-hidden">
    <header class="p-5 border-b border-slate-200 flex justify-between items-center bg-slate-50">
      <h3 class="font-bold text-sm tracking-wide uppercase text-slate-900 font-display">Log Rejection Reason</h3>
      <button onclick="dismissRejectionModal()" class="text-slate-400 hover:text-slate-700">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </header>
    
    <form id="rejection-htmx-form" hx-post="" hx-target="#applications-table-wrapper" onsubmit="dismissRejectionModal()">
      <div class="p-5 space-y-4 text-xs">
        <p class="text-slate-500">Provide rejection comments for the applicant. This notification is synchronized automatically with external mail provider queues.</p>
        <div>
          <label class="block font-bold text-slate-800 mb-1">Rejection Reason</label>
          <textarea name="reason" required rows="3" placeholder="Documentation mismatch or registration check failure."
                    class="w-full border border-slate-200 rounded-lg p-3 bg-white text-xs outline-none focus:ring-1 focus:ring-rose-500 focus:border-rose-500"></textarea>
        </div>
      </div>
      <footer class="p-4 border-t border-slate-100 bg-slate-50 flex justify-end space-x-2">
        <button type="button" onclick="dismissRejectionModal()" class="bg-white border border-slate-200 rounded-lg px-4 py-1.5 text-slate-700 font-bold hover:bg-slate-50">Cancel</button>
        <button type="submit" class="bg-rose-500 text-white rounded-lg px-4 py-1.5 font-bold hover:bg-rose-600">Submit decline</button>
      </footer>
    </form>
  </div>
</div>

<script>
  function toggleAppDetails(id) {
    const row = document.getElementById('app-details-' + id);
    row.classList.toggle('hidden');
  }

  function launchRejectionModal(appId) {
    const overlay = document.getElementById('rejection-modal-overlay');
    const form = document.getElementById('rejection-htmx-form');
    form.setAttribute('hx-post', `/admin/applications/${appId}/reject/`);
    // reprocess HTMX to parse the updated hx-post
    htmx.process(form);
    overlay.classList.remove('hidden');
  }

  function dismissRejectionModal() {
    document.getElementById('rejection-modal-overlay').classList.add('hidden');
  }
</script>
{% endblock %}
