<div class="divide-y divide-slate-100">
        {% for app in pending_count %}
        <div class="p-4 flex items-center justify-between hover:bg-slate-50/30 transition-colors">
          <div class="flex items-center space-x-3.5">
            <img class="w-9 h-9 rounded-full border border-slate-200 object-cover shrink-0" src="{{ app.user.profile.profile_pic.url }}" />
            <div>
              <span class="font-bold text-sm text-slate-900 block leading-tight">{{ app.user.profile.full_name }}</span>
              <span class="text-[11px] font-mono text-slate-400 block mt-0.5">{{ app.user.email }}</span>
            </div>
          </div>
          
          <div class="text-right">
            <span class="text-xs font-semibold text-slate-800 block leading-none">{{ app.organization_name }}</span>
            
          </div>

          <!-- Quick Action triggers -->
          <div class="flex items-center space-x-1.5">
            <button hx-get="/admin/applications/{{ app.id }}/approve/"
                    hx-target="#content"
                    class="bg-[#10b981] hover:bg-[#059669] text-white text-[10px] font-bold px-2.5 py-1 rounded transition-colors cursor-pointer">
              Approve
            </button>
          </div>
        </div>
        {% empty %}
         
        <div class="p-8 text-center text-slate-400 text-xs">
          <svg class="w-8 h-8 text-slate-300 mx-auto mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z" />
          </svg>
          No pending organizer applications in the queue! Excellent system integrity.
        </div>
        {% endfor %}
      </div>

    </div>
