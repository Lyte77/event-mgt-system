<!-- templates/myapp/partials/feed_items.html -->
{% for log in logs %}
<div class="feed-item" style="display:flex; gap:12px; align-items:flex-start; margin-bottom:16px;">
  <!-- Colored Dot Indicator -->
  <div class="feed-dot" style="width:8px; height:8px; border-radius:50%; margin-top:6px; background:{{ log.dot_color }}; flex-shrink:0;"></div>
  
  <!-- Text content generated by signals -->
  <div class="feed-text" style="flex-grow:1; font-size:14px; color:#333;">
    {{ log.html_text|safe }}
  </div>
  
  <!-- Humanized shorthand time indicator -->
  <div class="feed-time" style="font-size:12px; color:var(--text-muted); white-space:nowrap; margin-left:12px;">
    {{ log.human_time }}
  </div>
</div>
{% empty %}
<div class="text-muted text-sm" style="padding:12px; text-align:center;">
    No recent activity to display.
</div>
{% endfor %}
