 {% if pending_apps > 0 %}
        <div id="alert-notification-banner" class="bg-amber-50 border-b border-amber-200 px-6 py-2.5 flex items-center justify-between text-xs text-amber-800 shrink-0 select-none">
          <div class="flex items-center space-x-2">
            <svg class="w-4 h-4 text-amber-600 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
            </svg>
            <span>Operational Advisory: There are currently <strong>{{ pending_apps }}</strong> organizer applications awaiting administrative review. Delayed approvals impact festival launch indexes.</span>
          </div>
          <button id="dismiss-banner" onclick="document.getElementById('alert-notification-banner').remove();" class="text-amber-500 hover:text-amber-800 p-1 rounded transition-colors">
            <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
          </button>
        </div>
        {% endif %}
